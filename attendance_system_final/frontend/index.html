<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Attendance System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">📱</div>
    <div>
      <h2>Faculty Attendance Management System</h2>
      <p>Shree Dadaji Institude of Technology & Science</p>
    </div>
  </header>

  <div class="container">
    <div class="login-card">
      <h2>Log In</h2>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('faculty')">Faculty</button>
        <button class="tab" onclick="switchTab('hod')">HOD</button>
      </div>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Enter ID" required>
        <input type="password" id="password" placeholder="Enter Password" required>

        <div class="options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Sign In</button>

        <p class="register">Don't have an account? <a href="#">Register Now</a></p>
      </form>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
